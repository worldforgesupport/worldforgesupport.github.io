<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="2;url=https://havorawb.github.io/refund.html">
<title>WorldForge ahora es Havora</title>
<link rel="icon" type="image/png" href="https://havorawb.github.io/assets/logo.png">
<style>
  *{box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;background:#14122a;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center;padding:24px}
  .box{max-width:420px}
  img{width:56px;height:56px;border-radius:12px;margin-bottom:18px;background:#fff;padding:6px;box-sizing:border-box}
  h1{font-size:1.3rem;font-weight:700;margin:0 0 10px}
  p{color:rgba(255,255,255,.65);font-size:.9rem;line-height:1.6;margin:0 0 18px}
  a{color:#9aa4ff;font-size:.85rem;text-decoration:none;font-weight:600}
  a:hover{text-decoration:underline}
  .dots{display:inline-flex;gap:4px;margin-top:4px}
  .dots span{width:5px;height:5px;border-radius:50%;background:#9aa4ff;opacity:.4;animation:b 1.1s infinite ease-in-out}
  .dots span:nth-child(2){animation-delay:.15s}
  .dots span:nth-child(3){animation-delay:.3s}
  @keyframes b{0%,80%,100%{opacity:.25;transform:scale(.85)}40%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
  <div class="box">
    <img src="https://havorawb.github.io/assets/logo.png" alt="Havora">
    <h1>WorldForge ahora es Havora</h1>
    <p>Cambiamos de nombre. Te llevamos a la nueva política de reembolsos<br>en un momento<span class="dots"><span></span><span></span><span></span></span></p>
    <a href="https://havorawb.github.io/refund.html">Ir ahora a havorawb.github.io →</a>
  </div>
  <script>setTimeout(function(){ location.replace('https://havorawb.github.io/refund.html' + location.search); }, 2000);</script>
</body>
</html>
